[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --prefer-offline"]

[phases.build]
cmds = ["rm -rf .next", "npm run build", "cp -r public .next/standalone/public", "cp -r .next/static .next/standalone/.next/static"]

[start]
cmd = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
